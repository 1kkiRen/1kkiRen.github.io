    <canvas class="canvas" id="canvas" width="1795" height="830"></canvas>
    
    <script>

    document.getElementById('size').innerHTML = lineWidth;
    var canvas = document.getElementById("canvas")
    var paint = canvas.getContext("2d")
    var clear = document.getElementById("clear")
    var red_color = document.getElementById("red_color")
    var yellow_color = document.getElementById("yellow_color")
    var green_color = document.getElementById("green_color")
    var blue_color = document.getElementById("blue_color")
    var black_color = document.getElementById("black_color")
    var rubber = document.getElementById("rubber")
    var size_p = document.getElementById("size_p")
    var size_m = document.getElementById("size_m")
    var butt = document.getElementById("butt")
    var round = document.getElementById("round")
    var square = document.getElementById("square")
    var BAN = document.getElementById("BAN")
    var menuElem = document.getElementById('menu_btn');
    var titleElem = menuElem.querySelector('.title');
    var menuElem1 = document.getElementById('menu_btn1');
    var titleElem1 = menuElem1.querySelector('.title1');
    var menuElem2 = document.getElementById('menu_btn2');
    var titleElem2 = menuElem2.querySelector('.title2');
    

    var lineWidth=8
    size.innerHTML=lineWidth
    paint.lineCap = "round"
    var prevCap = 'round'

    
    //document.addEventListener("click", newFireWorkOnClick);
    titleElem.onclick = function() {
      menuElem.classList.toggle('open');
    };

    titleElem1.onclick = function() {
      menuElem1.classList.toggle('open');
    }; 

    titleElem2.onclick = function() {
      menuElem2.classList.toggle('open');
    }; 

    clear.addEventListener("click", function (e){
        paint.clearRect(0, 0, canvas.width, canvas.height);
    })   
    
    red_color.addEventListener("click", function(){
        paint.strokeStyle = "rgb(255,0,0)"
        paint.lineCap = prevCap 
    })
    yellow_color.addEventListener("click", function(){
        paint.strokeStyle = "rgb(255,255,0)"
        paint.lineCap = prevCap 
    })
    green_color.addEventListener("click", function(){
        paint.strokeStyle = "rgb(0,255,0)"
        paint.lineCap = prevCap 
    })
    blue_color.addEventListener("click", function(){
        paint.strokeStyle = "rgb(0,0,255)"
        paint.lineCap = prevCap 
    })
    black_color.addEventListener("click", function(){
        paint.strokeStyle = "rgb(0,0,0)"
        paint.lineCap = prevCap 
    })

    rubber.addEventListener("click", function(){
        
        paint.strokeStyle = "rgb(255,255,255)"
        paint.lineCap = "square"
    })   

    size_p.addEventListener("click", function(){        
            lineWidth=lineWidth+1
            size.innerHTML=lineWidth
    })

    round.addEventListener("click", function(){        
            paint.lineCap = "round"
            prevCap = "round"
    })

    butt.addEventListener("click", function(){        
            paint.lineCap = "butt"
            prevCap = "butt"
    })

    square.addEventListener("click", function(){        
            paint.lineCap = "square"
            prevCap = "square"
    })

    size_m.addEventListener("click", function(){
        if(lineWidth>1){
            lineWidth=lineWidth-1
        }
        
        size.innerHTML=lineWidth
    })
    
    document.addEventListener('keydown', function (e) {
            if (e.keyCode === 82){
                paint.strokeStyle = "rgb(255,0,0)"
                paint.lineCap = prevCap
            } 
            if (e.keyCode === 89){
                paint.strokeStyle = "rgb(255,255,0)"
                paint.lineCap = prevCap 
            } 
            if (e.keyCode === 71){
                paint.strokeStyle = "rgb(0,255,0)"
                paint.lineCap = prevCap 
            } 
            if (e.keyCode === 66){
                paint.strokeStyle = "rgb(0,0,255)"
                paint.lineCap = prevCap 
            } 
            if (e.keyCode === 81){
                paint.strokeStyle = "rgb(0,0,0)"
                paint.lineCap = prevCap 
            } 
            if (e.keyCode === 8){
                paint.strokeStyle = "rgb(255,255,255)"
                paint.lineCap = prevCap 
            } 
            if (e.keyCode === 67){
                paint.clearRect(0, 0, canvas.width, canvas.height);
            } 
            if (e.keyCode === 70){
                newFireworkSeed(event.pageX - brd.offsetLeft + cursorXOffset, event.pageY - brd.offsetTop + cursorYOffset);
            } 
            
            
        })

    canvas.onmousemove = function drawIfPressed(e){        
        paint.lineWidth = lineWidth
        var x=e.offsetX
        var y=e.offsetY
        var dx=e.movementX
        var dy=e.movementY

        if(e.buttons>0) {
            paint.beginPath()
            paint.moveTo(x,y)
            paint.lineTo(x-dx,y-dy)
            paint.stroke()
            paint.closePath()
      }
    } 

    
    
    var brd = document.createElement("DIV");
	document.body.insertBefore(brd, document.getElementById("board"));

		seeds = [];
		particles = [];

		const fwkPtcIniV = 0.5;
		const fwkSedIniV = 0.5;
		const fwkPtcIniT = 2500;
		const fwkSedIniT = 1000;
		const a = 0.0005;
		const g = 0.0005;
		const v = 1.5;
		const cursorXOffset = 0;
		const cursorYOffset = 5;


		function newFireworkParticle(x, y, angle)
		{
			var fwkPtc = document.createElement("DIV");
			fwkPtc.setAttribute('class', 'fireWorkParticle');
			fwkPtc.time = fwkPtcIniT;
			while(angle > 360)
				angle -= 360;
			while(angle < 0)
				angle += 360;
			fwkPtc.velocity = [];
			if(angle > 270)
			{
				fwkPtc.velocity.x = fwkPtcIniV * Math.sin(angle * Math.PI / 180) * (1 - Math.random() * v);
				fwkPtc.velocity.y = fwkPtcIniV * Math.cos(angle * Math.PI / 180) * (1 - Math.random() * v);
			}
			else if(angle > 180)
			{
				fwkPtc.velocity.x = fwkPtcIniV * Math.sin(angle * Math.PI / 180) * (1 - Math.random() * v);
				fwkPtc.velocity.y = fwkPtcIniV * Math.cos(angle * Math.PI / 180) * (1 - Math.random() * v);
			}
			else if(angle > 90)
			{
				fwkPtc.velocity.x = fwkPtcIniV * Math.sin(angle * Math.PI / 180) * (1 - Math.random() * v);
				fwkPtc.velocity.y = fwkPtcIniV * Math.cos(angle * Math.PI / 180) * (1 - Math.random() * v);
			}
			else
			{
				fwkPtc.velocity.x = fwkPtcIniV * Math.sin(angle * Math.PI / 180) * (1 - Math.random() * v);
				fwkPtc.velocity.y = fwkPtcIniV * Math.cos(angle * Math.PI / 180) * (1 - Math.random() * v);
			}
			fwkPtc.position = [];
			fwkPtc.position.x = x;
			fwkPtc.position.y = y;
			fwkPtc.style.left = fwkPtc.position.x + 'px';
			fwkPtc.style.top = fwkPtc.position.y + 'px';
			if(particles == null)
				particles = [];
			particles.push(fwkPtc);
			return fwkPtc;
		}

		document.addEventListener("keydown", function (e) {
            if (e.keyCode === 70){
                document.addEventListener("auxclick", newFireWorkOnClick);
            }
         });

		function newFireWorkOnClick(event)
		{
			newFireworkSeed(event.pageX - brd.offsetLeft + cursorXOffset, event.pageY - brd.offsetTop + cursorYOffset);
		}

		function newFireworkSeed(x, y)
		{
			var fwkSed = document.createElement("DIV");
			fwkSed.setAttribute('class', 'fireWorkSeed');
			brd.appendChild(fwkSed);
			fwkSed.time = fwkSedIniT;
			fwkSed.velocity = [];
			fwkSed.velocity.x = 0;
			fwkSed.velocity.y = fwkSedIniV;
			fwkSed.position = [];
			fwkSed.position.x = x;
			fwkSed.position.y = y;
			fwkSed.style.left = fwkSed.position.x + 'px';
			fwkSed.style.top = fwkSed.position.y + 'px';
			if(seeds == null)
				seeds = [];
			seeds.push(fwkSed);
			return fwkSed;
		}
		
		function newFireWorkStar(x, y)
		{
			var fwkBch = document.createElement("DIV");
			fwkBch.setAttribute('class', 'fireWorkBatch');
			var a = 0;
			while(a < 360)
			{
				var fwkPtc = newFireworkParticle(x, y, a);
				fwkBch.appendChild(fwkPtc);
				a += 5;
			}
			brd.appendChild(fwkBch);
		}

		var before = Date.now();
		var id = setInterval(frame, 5);
		
		function frame()
		{
			var current = Date.now();
			var deltaTime = current - before;
			before = current;
			for(i in seeds)
			{
				var fwkSed = seeds[i];
				fwkSed.time -= deltaTime;
				if(fwkSed.time > 0)
				{
					fwkSed.velocity.x -= fwkSed.velocity.x * a * deltaTime;
					fwkSed.velocity.y -= g * deltaTime + fwkSed.velocity.y * a * deltaTime;
					fwkSed.position.x += fwkSed.velocity.x * deltaTime;
					fwkSed.position.y -= fwkSed.velocity.y * deltaTime;
					fwkSed.style.left = fwkSed.position.x + 'px';
					fwkSed.style.top = fwkSed.position.y + 'px';
				}
				else
				{
					newFireWorkStar(fwkSed.position.x, fwkSed.position.y);
					fwkSed.parentNode.removeChild(fwkSed);
					seeds.splice(i, 1);
				}
			}
			for(i in particles)
			{
				var fwkPtc = particles[i];
				fwkPtc.time -= deltaTime;
				if(fwkPtc.time > 0)
				{
					fwkPtc.velocity.x -= fwkPtc.velocity.x * a * deltaTime;
					fwkPtc.velocity.y -= g * deltaTime + fwkPtc.velocity.y * a * deltaTime;
					fwkPtc.position.x += fwkPtc.velocity.x * deltaTime;
					fwkPtc.position.y -= fwkPtc.velocity.y * deltaTime;
					fwkPtc.style.left = fwkPtc.position.x + 'px';
					fwkPtc.style.top = fwkPtc.position.y + 'px';
				}
				else
				{
					fwkPtc.parentNode.removeChild(fwkPtc);
					particles.splice(i, 1);
				}
			}
		}







    </script>
